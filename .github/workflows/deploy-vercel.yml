name: Deploy production to Vercel

# Deploys from GitHub Actions via Vercel CLI (does not rely on Vercel Git webhooks /
# Deploy Hooks, which can return 201 without creating a build).
#
# Required repository secrets:
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID
# See: deploy/connection-pack/vercel-auto-deploy.md

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          [ -z "$VERCEL_TOKEN" ] && echo "::error::Missing secret VERCEL_TOKEN" && missing=1
          [ -z "$VERCEL_ORG_ID" ] && echo "::error::Missing secret VERCEL_ORG_ID" && missing=1
          [ -z "$VERCEL_PROJECT_ID" ] && echo "::error::Missing secret VERCEL_PROJECT_ID" && missing=1
          if [ "$missing" = "1" ]; then
            echo "Add all three repository secrets, then re-run this workflow."
            echo "Guide: deploy/connection-pack/vercel-auto-deploy.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull production config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $url"
          echo "### Vercel production deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
